apiVersion: apps/v1
kind: Deployment

metadata:
  name: nodejs-devops-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nodejs-devops-app

  template:
    metadata:
      labels:
        app: nodejs-devops-app

    spec:
      containers:
        - name: nodejs-devops-app

          image: umesh12a/nodejs-devops-app:v1

          ports:
            - containerPort: 3000

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5

          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5